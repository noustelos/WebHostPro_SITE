<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHostPro | Simple Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Το απαραίτητο fade-in για τη σελίδα */
        @keyframes simpleFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .landing-fade {
            animation: simpleFadeIn 1.0s ease-out forwards;
        }
    </style>
</head>
<body class="bg-deep-slate landing-fade">

    <nav class="nav-container">
        <a href="index.html" class="logo-style">WEBHOSTPRO</a>
        
        <a href="technical.html" class="nav-btn" style="border-color: var(--accent-tech);">
            <span class="btn-sub" style="color: rgba(255,255,255,0.6);">ΓΙΑ ΕΠΑΓΓΕΛΜΑΤΙΕΣ</span>
            <span class="btn-main" style="color: var(--accent-tech);">TECHNICAL</span>
        </a>
    </nav>

    <div class="hero-wrapper">
        <div class="photo-layers">
            <img src="assets/blue_fem_1.jpeg" alt="Simple Hosting" class="hero-img">
        </div>
        
        <div class="content-box">
            <h1 style="color: var(--accent-simple); font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; font-weight: 900; text-align: right; width: 100%; margin: 0;">
                Απλά.<br>Γρήγορα.
            </h1>

            <div style="width: 100%; display: flex; justify-content: flex-end; margin-top: 15px;">
                <p class="text-simple-sub" style="text-align: center; width: auto; max-width: 320px; margin: 0; line-height: 1.4;">
                    Φιλοξενία που λειτουργεί για εσάς, χωρίς τεχνικούς πονοκεφάλους.
                </p>
            </div>

            <div style="margin-top: 2.5rem; width: 100%; display: flex; justify-content: flex-end;">
                <button class="cta-primary">
                    ΞΕΚΙΝΗΣΤΕ ΤΩΡΑ
                </button>
            </div>
        </div>
    </div>

</body>
</html>
