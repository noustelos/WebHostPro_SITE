<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHostPro | Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F6F5F2] overflow-hidden">

    <div id="screen-pulse" class="fixed inset-0 flex items-center justify-center z-40 transition-opacity duration-[800ms]">
        <div class="absolute inset-0 animate-gradient-slow bg-gradient-to-br from-[#F6F5F2] via-[#D1D1D1] to-[#F6F5F2] bg-[length:400%_400%] opacity-100"></div>
        <div class="relative w-80 h-80 md:w-[480px] md:h-[480px] flex items-center justify-center scale-110" id="waveform-container">
            <div class="absolute inset-0 rounded-full border-2 border-gray-400 backdrop-blur-sm bg-white/20 shadow-2xl"></div>
            <svg viewBox="0 0 200 200" class="w-full h-full transform scale-90">
                <g id="bars"></g>
            </svg>
        </div>
    </div>

    <div id="screen-choice" class="fixed inset-0 z-50 transform -translate-y-full transition-transform duration-[1200ms] ease-[cubic-bezier(0.16,1,0.3,1)] flex flex-col items-center justify-center p-6" 
         style="background-color: rgba(28, 18, 8, 0.92); backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px);">
        
        <div class="mb-24 text-center opacity-0 transition-all duration-1000 delay-500" id="choice-content">
            <h2 class="text-white/90 text-xl md:text-2xl font-light tracking-[0.45em] uppercase font-['Syncopate']">WebHostPro</h2>
            <div class="h-[1px] bg-blue-500/50 mt-4 w-full max-w-[200px] mx-auto"></div>
            
            <div class="flex flex-col md:flex-row gap-8 mt-20 w-full max-w-lg">
                <a href="gr.html?mode=simple" class="group flex-1 py-10 px-4 rounded-xl bg-white/5 border border-white/10 text-center transition-all duration-500 hover:bg-white/10 hover:border-blue-500/50 active:scale-95 flex flex-col items-center justify-center">
                    <span class="text-white/30 text-[9px] uppercase tracking-[1em] mb-3 group-hover:text-blue-400 transition-colors">ΜΙΛΑΜΕ</span>
                    <span class="text-[#007AFF] text-xl font-bold uppercase tracking-[0.6em] ml-[0.6em]">ΑΠΛΑ</span>
                </a>

                <a href="gr.html?mode=tech" class="group flex-1 py-10 px-4 rounded-xl bg-white/5 border border-white/10 text-center transition-all duration-500 hover:bg-white/10 hover:border-red-500/50 active:scale-95 flex flex-col items-center justify-center">
                    <span class="text-white/30 text-[9px] uppercase tracking-[1em] mb-3 group-hover:text-red-400 transition-colors">ΜΙΛΑΜΕ</span>
                    <span class="text-[#FF3B30] text-xl font-bold uppercase tracking-[0.6em] ml-[0.6em]">ΤΕΧΝΙΚΑ</span>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
